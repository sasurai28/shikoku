// Firebase Realtime Database REST API で共有同期
const FB_DB_URL="https://shikoku-trip-e8a25-default-rtdb.asia-southeast1.firebasedatabase.app";
function makeFbSync(path){return{
  put(key,value){return fetch(FB_DB_URL+path+"/"+encodeURIComponent(key)+".json",{method:"PUT",body:JSON.stringify(value),headers:{"Content-Type":"application/json"}}).catch(e=>console.warn("sync write error:",e));},
  putAll(data){return fetch(FB_DB_URL+path+".json",{method:"PUT",body:JSON.stringify(data),headers:{"Content-Type":"application/json"}}).catch(e=>console.warn("sync write error:",e));},
  del(key){return fetch(FB_DB_URL+path+"/"+encodeURIComponent(key)+".json",{method:"DELETE"}).catch(e=>console.warn("sync delete error:",e));},
  listen(onPut,onPatch){
    const es=new EventSource(FB_DB_URL+path+".json");
    es.addEventListener("put",e=>{try{const d=JSON.parse(e.data);onPut(d.path,d.data);}catch{}});
    es.addEventListener("patch",e=>{try{const d=JSON.parse(e.data);onPatch(d.path,d.data);}catch{}});
    es.onerror=()=>{console.warn("sync connection lost, retrying...");};
    return()=>es.close();
  }
};}
const fbPhotos=makeFbSync("/photos");
const fbMemos=makeFbSync("/memos");
</script>

const MI=({name,fill,size,style})=><span className={`material-symbols-outlined${fill?" mi-fill":""}`} style={{fontSize:size||24,...style}}>{name}</span>;

const SpotPhoto=({ev,photoKey,customPhotos,onUploadClick})=>{
  const [f,setF]=useState(false);
  if(!ev.img&&!ev.grad)return null;
  const src=photoKey&&customPhotos?.[photoKey]?customPhotos[photoKey]:ev.img;
  const isCustom=photoKey&&customPhotos?.[photoKey];
  return(<div className="relative -mx-5 -mt-5 mb-4 h-48 rounded-t-[1.25rem] overflow-hidden group">
    {src&&!f?<img src={src} alt={ev.text} loading="lazy" referrerPolicy="no-referrer" onError={()=>setF(true)} className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"/>:
    <div className="w-full h-full flex items-center justify-center" style={{background:ev.grad||"linear-gradient(135deg,#666,#999)"}}>
      <span className="text-5xl drop-shadow-lg">{ev.femoji||"📍"}</span>
    </div>}
    {ev.flabel&&<span className="absolute bottom-2.5 right-3 text-[9px] font-bold text-white/80 tracking-[1.5px] drop-shadow-md z-10 uppercase">{ev.flabel}</span>}
    <div className="absolute inset-0 bg-gradient-to-t from-black/40 via-black/5 to-transparent"/>
    {onUploadClick&&<button className="absolute top-2.5 left-2.5 z-10 bg-black/40 text-white rounded-xl w-8 h-8 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity md:opacity-100 backdrop-blur-md" onClick={(e)=>{e.stopPropagation();onUploadClick(photoKey);}}><MI name={isCustom?"swap_horiz":"add_a_photo"} size={13}/></button>}
  </div>);
};

function App(){
  const [tab,setTab]=useState("schedule");
  const [sel,setSel]=useState(0);
  const [chk,setChk]=useState({});
  const [cover,setCover]=useState(true);
  const [pCat,setPCat]=useState(0);
  const [fabOpen,setFabOpen]=useState(false);
  const ref=useRef(null);
  const [memos,setMemos]=useState([]);
  const [memoSender,setMemoSender]=useState("ゆうき");
  const [memoText,setMemoText]=useState("");
  const chatEndRef=useRef(null);
  const [packCustom,setPackCustom]=useState({});
  const [newItemText,setNewItemText]=useState("");
  const [now,setNow]=useState(new Date());
  const [customPhotos,setCustomPhotos]=useState({});
  const [photoModal,setPhotoModal]=useState(null);
  const photoInputRef=useRef(null);
  const [mealDetail,setMealDetail]=useState(null);
  const [showMoney,setShowMoney]=useState(false);
  const [pinModal,setPinModal]=useState(false);
  const [pinInput,setPinInput]=useState("");
  const [pinError,setPinError]=useState(false);
  const titleTapRef=useRef({count:0,timer:null});

  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(t);},[]);
  useEffect(()=>{try{const s=localStorage.getItem(STORAGE_KEY);if(s)setChk(JSON.parse(s));}catch{}},[]);
  useEffect(()=>{try{localStorage.setItem(STORAGE_KEY,JSON.stringify(chk));}catch{}},[chk]);
  useEffect(()=>{
    try{const s=localStorage.getItem(MEMO_KEY);if(s)setMemos(JSON.parse(s));}catch{}
    return fbMemos.listen(
      (path,data)=>{
        const arr=Array.isArray(data)?data:data?Object.values(data):[];
        setMemos(arr);
        try{localStorage.setItem(MEMO_KEY,JSON.stringify(arr));}catch{}
      },
      (path,data)=>{
        const arr=Array.isArray(data)?data:data?Object.values(data):[];
        setMemos(p=>{const m=arr.length>p.length?arr:p;try{localStorage.setItem(MEMO_KEY,JSON.stringify(m));}catch{}return m;});
      }
    );
  },[]);
  useEffect(()=>{try{const s=localStorage.getItem(PACKING_CUSTOM_KEY);if(s)setPackCustom(JSON.parse(s));}catch{}},[]);
  useEffect(()=>{try{localStorage.setItem(PACKING_CUSTOM_KEY,JSON.stringify(packCustom));}catch{}},[packCustom]);
  const fbRemote=useRef(false);
  const photosRef=useRef(customPhotos);
  photosRef.current=customPhotos;
  // 写真データエクスポート（一時機能）: URL末尾に #export-photos でダウンロード
  useEffect(()=>{
    const handler=()=>{
      if(location.hash==="#export-photos"&&Object.keys(customPhotos).length>0){
        const blob=new Blob([JSON.stringify(customPhotos,null,2)],{type:"application/json"});
        const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="photos-export.json";a.click();
        URL.revokeObjectURL(a.href);history.replaceState(null,"",location.pathname);
      }
    };
    window.addEventListener("hashchange",handler);handler();
    return ()=>window.removeEventListener("hashchange",handler);
  },[customPhotos]);
  // Firebase同期: リアルタイムで写真を共有
  useEffect(()=>{
    try{const s=localStorage.getItem(PHOTO_KEY);if(s)setCustomPhotos(JSON.parse(s));}catch{}
    return fbPhotos.listen(
      (path,data)=>{
        fbRemote.current=true;
        if(path==="/"){setCustomPhotos(data||{});}
        else{const key=path.replace(/^\//,"");setCustomPhotos(p=>data===null?((k)=>{const n={...p};delete n[k];return n;})(key):{...p,[key]:data});}
      },
      (path,data)=>{
        fbRemote.current=true;
        if(path==="/"){setCustomPhotos(p=>({...p,...(data||{})}));}
        else{const key=path.replace(/^\//,"");setCustomPhotos(p=>({...p,[key]:data}));}
      }
    );
  },[]);
  useEffect(()=>{
    try{localStorage.setItem(PHOTO_KEY,JSON.stringify(customPhotos));}catch{}

      <div className="rounded-2xl p-5 text-center mb-5" style={{background:"linear-gradient(135deg,rgba(142,213,245,.15),rgba(26,127,168,.08))",border:"1px solid rgba(26,127,168,.06)"}}>
        <div className="num text-4xl font-extrabold text-gradient" style={{backgroundImage:"linear-gradient(135deg,#1a7fa8,#2b9ac4)"}}>{done}/{total}</div>
        <p className="text-xs text-on-sf-v/70 mt-1">{done===total?"🎉 全部準備OK！":"あと "+(total-done)+" 個！がんばろう"}</p>
        <div className="h-2 rounded-full overflow-hidden mt-3" style={{background:"rgba(138,130,112,.08)"}}><div className="h-full rounded-full transition-all duration-700 ease-out" style={{width:`${(done/total)*100}%`,background:"linear-gradient(90deg,#4a7a00,#6ba800)"}}/></div>
      </div>
      <div className="grid grid-cols-2 gap-2.5 mb-5">{PACKING.map((c,ci)=>{const items=getFilteredItems(ci);const cd=items.filter(x=>chk[`${ci}-${x.idx}`]).length;return<div key={ci} className={`card-modern p-4 kinetic cursor-pointer transition-all ${pCat===ci?"ring-2 ring-pri/20":"ring-1 ring-transparent"}`} style={pCat===ci?{background:"linear-gradient(135deg,rgba(26,127,168,.03),rgba(142,213,245,.05))"}:{}} onClick={()=>setPCat(ci)}>
        <div className="w-8 h-8 rounded-lg flex items-center justify-center mb-2" style={{background:"rgba(26,127,168,.06)"}}><MI name={c.icon} size={16} style={{color:"#1a7fa8"}}/></div>
        <div className="text-xs font-bold">{c.cat}</div><div className="text-[10px] text-on-sf-v/50 num font-semibold">{cd}/{items.length}</div>
        <div className="flex gap-1 mt-2">{items.slice(0,8).map((x,j)=><span key={j} className="w-1.5 h-1.5 rounded-full transition-colors" style={{background:chk[`${ci}-${x.idx}`]?"#4a7a00":"rgba(138,130,112,.12)"}}/>)}</div>
      </div>})}</div>
      <h3 className="text-sm font-bold mb-3 flex items-center gap-2"><div className="w-6 h-6 rounded-md flex items-center justify-center" style={{background:"rgba(26,127,168,.06)"}}><MI name={PACKING[pCat].icon} size={14} style={{color:"#1a7fa8"}}/></div>{PACKING[pCat].cat}</h3>
      {getFilteredItems(pCat).map(({item,idx})=>{const k=`${pCat}-${idx}`,d=!!chk[k];return<div key={idx} className="flex items-center gap-3 p-3.5 card-modern mb-1.5 transition-all" style={d?{opacity:.6}:{}}>
        <div className={`w-5 h-5 rounded-md flex-shrink-0 flex items-center justify-center border-2 transition-all cursor-pointer ${d?"text-white":"border-ol-v/30"}`} style={d?{background:"linear-gradient(135deg,#4a7a00,#6ba800)",borderColor:"transparent"}:{}} onClick={()=>tog(k)}>{d&&<MI name="check" size={12}/>}</div>
        <span className={`text-xs font-medium flex-1 cursor-pointer ${d?"line-through text-on-sf-v/50":""}`} onClick={()=>tog(k)}>{item}</span>
        <button className="w-6 h-6 rounded-md flex items-center justify-center text-ol-v/40 hover:text-err hover:bg-err/8 transition-colors" onClick={()=>deleteItem(pCat,idx)}><MI name="close" size={12}/></button>
      </div>})}
      <div className="flex gap-2 mt-3">
        <input className="flex-1 px-4 py-2.5 rounded-xl border-[1.5px] border-ol-v/10 text-xs bg-white outline-none focus:border-pri/50 font-b transition-colors" placeholder="アイテムを追加..." value={newItemText} onChange={e=>setNewItemText(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")addCustomItem(pCat);}}/>
        <button className="px-5 py-2.5 rounded-xl text-white text-xs font-bold kinetic" style={{background:"linear-gradient(135deg,#1a7fa8,#2b9ac4)"}} onClick={()=>addCustomItem(pCat)}>＋追加</button>
      </div>
    </div>}

    {/* ===== MEMO TAB ===== */}
    {tab==="memo"&&<div className="flex flex-col" style={{height:"calc(100dvh - 130px)"}}>
      <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-3">
        {memos.length===0&&<div className="text-center text-on-sf-v/40 text-sm mt-10 leading-relaxed">💬 旅行中のメモや連絡を<br/>ここに残せます</div>}
        {memos.map((m,i)=>{const isY=m.sender==="ゆうき";const t=new Date(m.time);const ts=`${t.getMonth()+1}/${t.getDate()} ${String(t.getHours()).padStart(2,"0")}:${String(t.getMinutes()).padStart(2,"0")}`;
          return<div key={i} className={`max-w-[78%] px-4 py-3 text-sm leading-relaxed ${isY?"self-end rounded-2xl rounded-br-sm text-white":"self-start rounded-2xl rounded-bl-sm text-on-sf"}`} style={isY?{background:"linear-gradient(135deg,#1a7fa8,#2b9ac4)",boxShadow:"0 4px 16px rgba(26,127,168,.12)"}:{background:"rgba(142,213,245,.15)",border:"1px solid rgba(142,213,245,.1)"}}>
            <div className="text-[10px] font-bold opacity-50 mb-0.5">{m.sender}</div>
            <div>{m.text}</div>
            <div className="text-[9px] opacity-35 text-right mt-1 num">{ts}</div>
          </div>;
        })}
        <div ref={chatEndRef}/>
      </div>
      <div className="flex gap-2 px-4 py-3 glass bg-sf/75 safe-b" style={{borderTop:"1px solid rgba(138,130,112,.06)"}}>
        <div className="flex rounded-xl overflow-hidden flex-shrink-0" style={{border:"1.5px solid rgba(138,130,112,.08)"}}>
          <button className={`px-3 py-2 text-[10px] font-bold transition-all ${memoSender==="ゆうき"?"text-white":"bg-white text-on-sf-v/50"}`} style={memoSender==="ゆうき"?{background:"linear-gradient(135deg,#1a7fa8,#2b9ac4)"}:{}} onClick={()=>setMemoSender("ゆうき")}>ゆうき</button>
          <button className={`px-3 py-2 text-[10px] font-bold transition-all ${memoSender==="ママ"?"text-white":"bg-white text-on-sf-v/50"}`} style={memoSender==="ママ"?{background:"linear-gradient(135deg,#c43a39,#e05554)"}:{}} onClick={()=>setMemoSender("ママ")}>ママ</button>
        </div>
        <input className="flex-1 px-4 py-2 rounded-xl text-xs outline-none focus:border-pri/40 font-b transition-colors" style={{background:"rgba(138,130,112,.04)",border:"1.5px solid rgba(138,130,112,.08)"}} placeholder="メッセージ..." value={memoText} onChange={e=>setMemoText(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")sendMemo();}}/>
        <button className="w-10 h-10 rounded-xl text-white flex items-center justify-center flex-shrink-0 kinetic" style={{background:"linear-gradient(135deg,#1a7fa8,#2b9ac4)",boxShadow:"0 3px 10px rgba(26,127,168,.15)"}} onClick={sendMemo}><MI name="send" size={16}/></button>
      </div>
    </div>}

    {/* ===== EMERGENCY TAB ===== */}
    {tab==="emergency"&&<div className="px-4 pt-4 pb-28">
      <div className="rounded-2xl p-5 mb-5" style={{background:"linear-gradient(135deg,rgba(196,58,57,.04),rgba(255,168,160,.06))",border:"1px solid rgba(196,58,57,.06)"}}>
        <div className="font-h font-bold text-err flex items-center gap-2 mb-4"><MI name="emergency" fill size={18}/>緊急連絡先</div>
        {EMERGENCY.filter(e=>e.critical).map((e,i)=><div key={i} className="card-modern p-3.5 mb-2 flex justify-between items-center"><span className="text-xs font-bold flex items-center gap-2.5"><div className="w-7 h-7 rounded-lg flex items-center justify-center" style={{background:"rgba(196,58,57,.06)"}}><MI name={e.icon} size={14} style={{color:"#c43a39"}}/></div>{e.label}</span><a className="num font-extrabold text-xl tracking-wider text-gradient" style={{backgroundImage:"linear-gradient(135deg,#c43a39,#e05554)"}} href={`tel:${e.number}`}>{e.number}</a></div>)}
      </div>
      {[["医療相談","medical"],["ロードサービス","road"]].map(([title,key])=><div key={title}>
        <h4 className="text-[10px] font-bold text-on-sf-v/50 mt-5 mb-2.5 tracking-[2px] uppercase">{title}</h4>
        {EMERGENCY.filter(e=>e[key]).map((e,i)=><div key={i} className="card-modern p-3.5 mb-2 flex justify-between items-center"><span className="text-xs font-bold flex items-center gap-2.5"><div className="w-7 h-7 rounded-lg flex items-center justify-center" style={{background:"rgba(26,127,168,.06)"}}><MI name={e.icon} size={14} style={{color:"#1a7fa8"}}/></div>{e.label}</span><a className="num font-extrabold text-base text-gradient" style={{backgroundImage:"linear-gradient(135deg,#1a7fa8,#2b9ac4)"}} href={`tel:${e.number}`}>{e.number}</a></div>)}
      </div>)}
      <h4 className="text-[10px] font-bold text-on-sf-v/50 mt-5 mb-2.5 tracking-[2px] uppercase">宿泊施設</h4>
      {EMERGENCY.filter(e=>!e.critical&&!e.medical&&!e.road).map((e,i)=><div key={i} className="card-modern p-3.5 mb-2 flex justify-between items-center"><span className="text-xs font-bold flex items-center gap-2.5"><div className="w-7 h-7 rounded-lg flex items-center justify-center" style={{background:"rgba(26,127,168,.06)"}}><MI name={e.icon} size={14} style={{color:"#1a7fa8"}}/></div>{e.label}</span><a className="num font-extrabold text-base text-gradient" style={{backgroundImage:"linear-gradient(135deg,#1a7fa8,#2b9ac4)"}} href={`tel:${e.number}`}>{e.number}</a></div>)}
      <h4 className="text-[10px] font-bold text-on-sf-v/50 mt-5 mb-2.5 tracking-[2px] uppercase">フェリー予約番号</h4>
      <div className="card-modern p-3.5 mb-2 flex justify-between items-center"><span className="text-xs font-bold flex items-center gap-2.5"><div className="w-7 h-7 rounded-lg flex items-center justify-center" style={{background:"rgba(26,127,168,.06)"}}><MI name="directions_boat" size={14} style={{color:"#1a7fa8"}}/></div>高松→土庄 4/25</span><span className="font-mono text-xs font-bold text-on-sf-v/70">0304250903</span></div>
      <div className="card-modern p-3.5 mb-2 flex justify-between items-center"><span className="text-xs font-bold flex items-center gap-2.5"><div className="w-7 h-7 rounded-lg flex items-center justify-center" style={{background:"rgba(26,127,168,.06)"}}><MI name="directions_boat" size={14} style={{color:"#1a7fa8"}}/></div>土庄→高松 4/27</span><span className="font-mono text-xs font-bold text-on-sf-v/70">0404270802</span></div>
      <div className="rounded-2xl p-4 mt-5 text-center text-xs text-on-sf-v/60 leading-relaxed" style={{background:"rgba(138,130,112,.04)",border:"1.5px dashed rgba(138,130,112,.1)"}}>⚠️ 車検証はフェリー乗船時に必須です<br/>🚗 GLC300（なにわ る・416）</div>
    </div>}

    {/* Meal Detail Modal */}
    {mealDetail&&<div className="fixed inset-0 z-[60] flex items-end justify-center bg-black/30 backdrop-blur-md" onClick={()=>setMealDetail(null)}>
      <div className="bg-white rounded-t-3xl p-6 mx-0 max-w-[480px] w-full animate-slide-up max-h-[70dvh] overflow-y-auto" style={{boxShadow:"0 -8px 40px rgba(44,40,24,.12)"}} onClick={e=>e.stopPropagation()}>
        <div className="w-10 h-1 rounded-full mx-auto mb-5" style={{background:"rgba(138,130,112,.15)"}}/>
        <h3 className="font-h font-bold text-xl mb-1.5">{mealDetail.name}</h3>
        {mealDetail.note&&<p className="text-xs text-on-sf-v/70 mb-5 rounded-xl px-4 py-2.5 leading-relaxed" style={{background:"rgba(138,130,112,.04)"}}>{mealDetail.note}</p>}
        <div className="space-y-3">
          {[["location_on","住所",mealDetail.addr,"#1a7fa8"],["call","電話",mealDetail.tel,"#1a7fa8"],["schedule","営業時間",mealDetail.hours,"#4a7a00"],["payments","予算",mealDetail.budget,"#c43a39"]].map(([icon,label,val,color])=>
          <div key={label} className="flex items-start gap-3"><div className="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0" style={{background:`${color}10`}}><MI name={icon} size={16} style={{color}}/></div><div><p className="text-[9px] font-bold text-on-sf-v/50 uppercase tracking-[1.5px]">{label}</p>{label==="電話"&&val!=="—"?<a href={`tel:${val}`} className="text-xs font-bold text-pri">{val}</a>:<p className="text-xs font-medium">{label==="予算"&&!showMoney?"•••••":val}</p>}</div></div>)}
        </div>
        <div className="flex gap-2 mt-6">
          <a href={mealDetail.maps} target="_blank" rel="noopener noreferrer" className="flex-1 flex items-center justify-center gap-1.5 py-3.5 text-white rounded-xl font-bold text-xs kinetic" style={{background:"linear-gradient(135deg,#1a7fa8,#2b9ac4)",boxShadow:"0 4px 16px rgba(26,127,168,.15)"}}><MI name="map" size={16}/>地図を開く</a>
          {mealDetail.url&&<a href={mealDetail.url} target="_blank" rel="noopener noreferrer" className="flex-1 flex items-center justify-center gap-1.5 py-3.5 text-on-sf rounded-xl font-bold text-xs kinetic" style={{background:"rgba(138,130,112,.05)"}}><MI name="open_in_new" size={16}/>公式サイト</a>}
        </div>
        <button className="w-full mt-3 py-2.5 text-on-sf-v/50 text-xs font-medium" onClick={()=>setMealDetail(null)}>閉じる</button>
      </div>
    </div>}

    {/* Photo Upload Modal */}
    {photoModal&&<div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/30 backdrop-blur-md" onClick={()=>setPhotoModal(null)}>
      <div className="bg-white rounded-3xl p-6 mx-4 max-w-xs w-full animate-scale-in" style={{boxShadow:"0 20px 60px rgba(44,40,24,.15)"}} onClick={e=>e.stopPropagation()}>
        <h3 className="font-h font-bold text-lg mb-1">写真を<span className="serif-i text-gradient" style={{backgroundImage:"linear-gradient(135deg,#1a7fa8,#2b9ac4)"}}>変更</span></h3>
        <p className="text-xs text-on-sf-v/60 mb-5">旅行中に撮った写真で差し替えできます</p>
        <label className="flex items-center justify-center gap-2 w-full py-3.5 text-white rounded-xl font-bold text-sm kinetic cursor-pointer" style={{background:"linear-gradient(135deg,#1a7fa8,#2b9ac4)",boxShadow:"0 4px 16px rgba(26,127,168,.15)"}}>
          <MI name="photo_camera" size={18}/>写真を選択
          <input type="file" accept="image/*" className="hidden" onChange={(e)=>handlePhotoUpload(photoModal,e)}/>
        </label>
        {customPhotos[photoModal]&&<button className="w-full mt-2.5 py-2.5 rounded-xl font-bold text-xs kinetic" style={{background:"rgba(196,58,57,.06)",color:"#c43a39"}} onClick={()=>{const k=photoModal;setCustomPhotos(p=>{const n={...p};delete n[k];return n;});fbPhotos.del(k);setPhotoModal(null);}}>元の写真に戻す</button>}
        <button className="w-full mt-2 py-2 text-on-sf-v/50 text-xs font-medium" onClick={()=>setPhotoModal(null)}>キャンセル</button>
      </div>
    </div>}

    {/* FAB - hidden on memo tab */}
    {tab!=="memo"&&<><div className={`fixed inset-0 bg-on-sf/15 z-[43] glass transition-opacity duration-200 ${fabOpen?"opacity-100":"opacity-0 pointer-events-none"}`} onClick={()=>setFabOpen(false)}/>
    <div className={`fixed bottom-[132px] right-[max(calc((100%-480px)/2+12px),12px)] z-[44] flex flex-col gap-2.5 items-end transition-all duration-300 ${fabOpen?"opacity-100 translate-y-0":"opacity-0 translate-y-4 pointer-events-none"}`} style={{paddingBottom:"env(safe-area-inset-bottom,20px)"}}>
      {[{icon:"luggage",label:"持ち物チェック",color:"#1a7fa8",action:()=>{setFabOpen(false);setTab("packing");}},{icon:"emergency",label:"緊急連絡先",color:"#c43a39",action:()=>{setFabOpen(false);setTab("emergency");}},{icon:"auto_stories",label:"表紙に戻る",color:"#1a7fa8",action:()=>{setFabOpen(false);setCover(true);}}].map((f,i)=><button key={i} className="flex items-center gap-2.5 card-modern px-4 py-3 font-b text-xs font-bold kinetic animate-fade-up" style={{animationDelay:`${i*50}ms`}} onClick={f.action}><MI name={f.icon} size={16} style={{color:f.color}}/>{f.label}</button>)}
    </div>
    <button className={`fixed bottom-[calc(70px+env(safe-area-inset-bottom,20px))] right-[max(calc((100%-480px)/2+16px),16px)] z-[45] w-14 h-14 rounded-2xl text-white flex items-center justify-center kinetic transition-all duration-300 ${fabOpen?"rotate-45":""}`} style={{background:fabOpen?"#2c2818":"linear-gradient(135deg,#c43a39,#e05554)",boxShadow:fabOpen?"0 4px 20px rgba(44,40,24,.2)":"0 8px 28px rgba(196,58,57,.25)"}} onClick={()=>setFabOpen(f=>!f)}><MI name="add" size={26}/></button></>}

    {/* PIN Modal */}
    {pinModal&&<div className="fixed inset-0 z-[70] flex items-center justify-center bg-black/40 backdrop-blur-md" onClick={()=>setPinModal(false)}>
      <div className="bg-white rounded-3xl p-8 mx-6 max-w-[320px] w-full animate-scale-in text-center" style={{boxShadow:"0 20px 60px rgba(44,40,24,.15)"}} onClick={e=>e.stopPropagation()}>
        <div className="w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4" style={{background:"linear-gradient(135deg,rgba(26,127,168,.08),rgba(142,213,245,.12)"}}><MI name="lock" size={24} style={{color:"#1a7fa8"}}/></div>
        <h3 className="font-h font-bold text-lg mb-2">予算を表示</h3>
        <p className="text-xs text-on-sf-v/60 mb-6">PINコードを入力してください</p>
        <div className="flex justify-center gap-3 mb-5">{[0,1,2,3].map(i=><div key={i} className="w-12 h-12 rounded-xl flex items-center justify-center text-xl font-bold transition-all" style={{background:pinError?"rgba(196,58,57,.08)":pinInput[i]?"rgba(26,127,168,.08)":"rgba(138,130,112,.04)",border:pinError?"2px solid rgba(196,58,57,.2)":pinInput[i]?"2px solid rgba(26,127,168,.2)":"2px solid rgba(138,130,112,.08)",color:pinError?"#c43a39":"#2c2818"}}>{pinInput[i]?"●":""}</div>)}</div>
        {pinError&&<p className="text-xs text-err font-bold mb-4">PINが違います</p>}
        <div className="grid grid-cols-3 gap-2">{[1,2,3,4,5,6,7,8,9,null,0,"del"].map((n,i)=><button key={i} className={`h-12 rounded-xl font-bold text-base kinetic ${n===null?"invisible":""}`} style={{background:n==="del"?"rgba(196,58,57,.06)":"rgba(138,130,112,.04)"}} onClick={()=>{if(n==="del")setPinInput(p=>p.slice(0,-1));else if(n!==null&&pinInput.length<4){const next=pinInput+n;setPinInput(next);if(next.length===4){if(next===MONEY_PIN){setShowMoney(true);localStorage.setItem(MONEY_KEY,"1");setPinModal(false);setPinInput("");}else{setPinError(true);setTimeout(()=>{setPinError(false);setPinInput("");},1000);}}}}}>{n==="del"?<MI name="backspace" size={18} style={{color:"#c43a39"}}/>:n!==null?n:""}</button>)}</div>
        <button className="mt-5 text-xs text-on-sf-v/40 font-bold" onClick={()=>setPinModal(false)}>キャンセル</button>
      </div>
    </div>}

    {/* Bottom Nav */}
    <nav className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] z-50 flex justify-around items-center px-2 py-2 glass bg-sf/75 safe-b" style={{borderTop:"1px solid rgba(138,130,112,.06)",boxShadow:"0 -4px 24px rgba(44,40,24,.03)"}}>
      {TABS.map(t=><button key={t.id} className={`flex flex-col items-center gap-0.5 px-4 py-2 rounded-2xl transition-all duration-200 kinetic ${tab===t.id?"text-white":"text-on-sf-v/40 hover:text-on-sf-v/70"}`} style={tab===t.id?{background:"linear-gradient(135deg,#1a7fa8,#2b9ac4)",boxShadow:"0 4px 16px rgba(26,127,168,.2)"}:{}} onClick={()=>{setTab(t.id);setFabOpen(false);}}>
        <MI name={t.icon} fill={tab===t.id} size={20}/>
        <span className="text-[9px] font-bold font-b">{t.label}</span>
      </button>)}
    </nav>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').then(r=>{
      console.log('SW registered:',r.scope);
    }).catch(e=>console.log('SW registration failed:',e));
  });
}
</script>
</body>
</html>
