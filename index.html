.hc-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;}

.mn2{font-size:12px;font-weight:500;flex:1;}.mn2.w{color:var(--err);font-weight:700;}
.me{font-size:14px;flex-shrink:0;}
.ms{font-size:8px;font-weight:700;padding:2px 6px;border-radius:5px;}.ms.ok{color:var(--t);background:rgba(99,93,21,.07);}.ms.wn2{color:var(--err);background:rgba(180,19,64,.05);}

.psn{font-family:var(--fh);font-size:40px;font-weight:800;color:var(--p);}
.pss{font-size:12px;color:var(--ink2);margin-top:4px;}

.fab-menu{position:fixed;bottom:calc(132px + env(safe-area-inset-bottom,20px));right:max(calc((100% - 480px)/2 + 8px),8px);z-index:44;display:flex;flex-direction:column;gap:8px;align-items:flex-end;pointer-events:none;opacity:0;transform:translateY(12px);transition:all .25s cubic-bezier(.4,0,.2,1);}

.fab-action{display:flex;align-items:center;gap:8px;background:var(--sw);border-radius:12px;padding:10px 14px;box-shadow:0 4px 16px rgba(0,0,0,.1);cursor:pointer;transition:all .15s;font-family:var(--fb);font-size:12px;font-weight:600;color:var(--ink);border:none;-webkit-tap-highlight-color:transparent;}
.fab-action:active{transform:scale(.96);}.fab-action .material-symbols-outlined{font-size:18px;color:var(--p);}
.fab-overlay{position:fixed;inset:0;background:rgba(46,47,45,.15);z-index:43;backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity .25s;}
.fab-overlay.open{opacity:1;pointer-events:auto;}
/* Install prompt */
.install-banner{position:fixed;bottom:calc(70px + env(safe-area-inset-bottom,20px));left:50%;transform:translateX(-50%);width:calc(100% - 40px);max-width:440px;z-index:60;background:var(--sw);border-radius:16px;padding:16px;box-shadow:0 8px 32px rgba(0,0,0,.15);display:flex;gap:12px;align-items:center;border:1px solid rgba(174,173,170,.1);}
.install-banner button{flex-shrink:0;padding:8px 18px;border-radius:99px;font-family:var(--fh);font-size:12px;font-weight:700;border:none;cursor:pointer;}
.install-banner .ib-install{background:var(--p);color:var(--op);}
.install-banner .ib-close{background:var(--sl);color:var(--ink2);}

const MI=({name,fill,size,style})=><span className={`material-symbols-outlined${fill?" mi-fill":""}`} style={{fontSize:size||24,...style}}>{name}</span>;

// Photo component: real img with gradient+emoji fallback
const SpotPhoto=({ev})=>{
  const [failed,setFailed]=useState(false);
  if(!ev.img&&!ev.grad)return null;
  return(<div className="sp">
    {ev.img&&!failed?<img src={ev.img} alt={ev.text} loading="lazy" onError={()=>setFailed(true)}/>:
    <div className="sp-fallback" style={{background:ev.grad||"linear-gradient(135deg,#666,#999)"}}>
      <span className="sp-emoji">{ev.femoji||"📍"}</span>
    </div>}
    {ev.flabel&&<span className="sp-label">{ev.flabel}</span>}
  </div>);
};

// Hotel card photo with fallback
const HotelImg=({b,h})=>{
  const [failed,setFailed]=useState(false);
  return(<div className="hc-img" style={{background:b.grad,height:h||140}}>
    {b.img&&!failed?<img src={b.img} alt={b.name} loading="lazy" onError={()=>setFailed(true)}/>:
    <div className="hc-img-fb"><span>{b.emoji}</span></div>}
    {b.tag&&<div className={`hc-tag${b.tag==="Premium Stay"?" premium":""}`}>{b.tag}</div>}
    <div style={{position:"relative",zIndex:2}}><div className="hc-name" style={h?{fontSize:15}:{}}>{b.name}</div><div className="hc-area">{b.area}{b.nights?`・${b.nights}`:""}</div></div>
  </div>);
};

function App(){
  const [tab,setTab]=useState("schedule");
  const [sel,setSel]=useState(0);
  const [chk,setChk]=useState({});
  const [cover,setCover]=useState(true);
  const [pCat,setPCat]=useState(0);
  const [fabOpen,setFabOpen]=useState(false);
  const ref=useRef(null);

  // LocalStorage for checklist (works offline)
  useEffect(()=>{try{const s=localStorage.getItem(STORAGE_KEY);if(s)setChk(JSON.parse(s));}catch{}},[]);
  useEffect(()=>{try{localStorage.setItem(STORAGE_KEY,JSON.stringify(chk));}catch{}},[chk]);

  const tog=k=>setChk(p=>({...p,[k]:!p[k]}));
  const total=PACKING.reduce((s,c)=>s+c.items.length,0);
  const done=Object.values(chk).filter(Boolean).length;
  const now=new Date();
  const trip=new Date("2026-04-23T00:00:00+09:00");
  const diff=Math.max(0,trip-now);
  const dL=Math.floor(diff/864e5),hL=Math.floor((diff%864e5)/36e5),mL=Math.floor((diff%36e5)/6e4);
  const day=DAYS[sel];
  useEffect(()=>{if(ref.current){const el=ref.current.querySelector(".dc.a");if(el)el.scrollIntoView({behavior:"smooth",inline:"center",block:"nearest"});}},[sel]);

  const dt=ev=>{
    if(ev.warn)return"w";
    if(["hotel","spa","villa"].includes(ev.icon))return"h";
    if(["restaurant","dining","ramen_dining","local_pizza","set_meal","coffee"].includes(ev.icon))return"f";
    return"";
  };

  if(cover)return(<div className="app"><div className="cover washi">
    <div className="cover-deco">shrine</div>
    <div className="cover-badge">FAMILY EXPEDITION 2026</div>
    <h2>四国家族旅行<br/>しおり</h2>
    <p className="cover-sub">四国四県を巡る14泊15日の旅</p>
    <div className="cd-bento">{[[dL,"日"],[hL,"時間"],[mL,"分"]].map(([n,u],i)=><div className="cd-cell" key={i}><span className="cd-num">{String(n).padStart(2,"0")}</span><span className="cd-unit">{u}</span></div>)}</div>
    <div className="fam-grid">{FAMILY.map(m=><div key={m.name} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
      <div className="fam-av" style={{background:m.color+"22"}}><MI name={m.icon} style={{color:m.color}} size={22}/></div>
      <span style={{fontSize:11,fontWeight:700}}>{m.name}</span><span style={{fontSize:9,color:"#5b5c59"}}>{m.role}</span>
    </div>)}</div>
    <button className="cover-btn" onClick={()=>setCover(false)}>しおりを開く</button>
  </div></div>);

  return(<div className="app washi">
    <div className="glass"><h1 onClick={()=>setCover(true)}>{tab==="schedule"?"旅のしおり":TABS.find(t=>t.id===tab)?.label}</h1><span style={{fontSize:11,fontWeight:700,color:"#8b4749"}}>Day {sel+1}/14</span></div>

    {tab==="schedule"&&<>
      <div className="day-nav" ref={ref}>{DAYS.map((d,i)=><button key={i} className={`dc${sel===i?" a":""}`} onClick={()=>setSel(i)}>{d.emoji} Day {d.day}</button>)}</div>
      <div className="ct" key={sel}>
        <div className="dh"><span className="rg">{day.region}</span><span className="dl">DAY {day.day}</span><h3>{day.emoji} {day.title}</h3><span className="dd">{day.date}</span>
          {day.stay&&<div className="sb"><MI name="hotel" size={14}/>{day.stay}{day.stayArea&&<span style={{opacity:.7}}>・{day.stayArea}</span>}</div>}
        </div>
        <div className="wn"><MI name="lightbulb" size={18} style={{color:"#006381",flexShrink:0}}/><p>天気予報は出発1週間前に表示されます</p></div>
        <div className="tl">{day.events.map((ev,i)=><div className="ti" key={i}>
          <div className={`td ${dt(ev)}`}><MI name={ev.icon} size={12}/></div>
          <div className="tc">
            <SpotPhoto ev={ev}/>
            <div className="tt">{ev.time}</div><div className="tx">{ev.text}</div>
            <div className="chips">{ev.confirmed&&<span className="ch-ok">✅ 確定</span>}{ev.warn&&<span className="ch-w">⚠️ 注意</span>}</div>
            {ev.note&&<div className="tn"><MI name="push_pin" size={13}/>{ev.note}</div>}
            {ev.maps&&<a href={ev.maps} target="_blank" rel="noopener noreferrer" className="ml"><MI name="location_on" size={13}/>地図を見る</a>}
          </div>
        </div>)}</div>

        {(()=>{const d2b=[0,1,2,2,3,4,5,5,6,7,8,9,10,-1];const bi=d2b[sel];if(bi<0||bi==null)return null;const bk=BOOKINGS[bi];if(!bk)return null;return(
          <div className="hc" style={{marginTop:16}}>
            <HotelImg b={bk} h={110}/>
            <div className="hc-body" style={{padding:"10px 14px"}}>
              <div className="hc-meta" style={{marginBottom:6}}>
                <span className="hc-chip"><MI name="login" size={13}/>CI {bk.ci}</span>
                <span className="hc-chip"><MI name="restaurant" size={13}/>{bk.meal}</span>
              </div>
              <div className="hc-footer">
                <div className="hc-price" style={{fontSize:15}}>{bk.amount}</div>
                <a className="hc-btn hc-btn-primary" href={`https://maps.google.com/?q=${encodeURIComponent(bk.name+" "+bk.area)}`} target="_blank" rel="noopener noreferrer"><MI name="map" size={16}/></a>
              </div>
            </div>
          </div>);})()}

        {sel<DAYS.length-1&&<div style={{marginTop:16,background:"rgba(139,71,73,.04)",borderRadius:12,padding:"14px 16px",border:"2px dashed rgba(139,71,73,.15)",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}} onClick={()=>setSel(sel+1)}>
          <div><span style={{fontSize:11,fontWeight:700,color:"#8b4749"}}>Coming Next</span><div style={{fontFamily:"var(--fh)",fontWeight:700,fontSize:15,marginTop:2}}>{DAYS[sel+1].emoji} {DAYS[sel+1].title}</div></div>
          <MI name="arrow_forward_ios" size={18} style={{color:"#8b4749"}}/>
        </div>}
      </div>
    </>}

    {tab==="meals"&&<div className="ct">
      <div className="bb"><div className="bm">
        <div style={{fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"#8b4749"}}>旅行概算</div>

        <div style={{fontSize:10,color:"#5b5c59"}}>宿泊 ¥804,741 ＋ 食事・交通</div>
        <div style={{height:5,borderRadius:5,overflow:"hidden",display:"flex",marginTop:10,background:"#e9e8e4"}}>
          <div style={{width:"65%",background:"#8b4749",height:"100%"}}/><div style={{width:"25%",background:"#006381",height:"100%"}}/><div style={{width:"10%",background:"#635d15",height:"100%"}}/>
        </div>
      </div><div className="bs"><MI name="restaurant_menu" size={26} style={{marginBottom:4}}/><span style={{fontFamily:"var(--fh)",fontSize:10,fontWeight:700,opacity:.8}}>食事進捗</span><span style={{fontFamily:"var(--fh)",fontSize:26,fontWeight:800}}>81%</span><span style={{fontSize:9,opacity:.7}}>34/42食</span></div></div>
      <h3 style={{fontFamily:"var(--fh)",fontSize:20,fontWeight:800,marginBottom:14}}>14日間の食事プラン</h3>

        {MEALS.map((m,i)=><div className="md" key={i}><div className="mn">{m.d}</div><div className="mh">{m.date}</div>

        </div>)}
      </div>
      <h3 style={{fontFamily:"var(--fh)",fontSize:18,fontWeight:800,margin:"20px 0 10px",display:"flex",alignItems:"center",gap:6}}><MI name="hotel" size={20} style={{color:"#006381"}}/>宿泊予約リスト</h3>
      {BOOKINGS.map((b,i)=><div className="hc" key={i}>

    {tab==="packing"&&<div className="ct">

      <div className="pbg">{PACKING.map((c,ci)=>{const cd=c.items.filter((_,ii)=>chk[`${ci}-${ii}`]).length;return<div key={ci} className={`pbc${pCat===ci?" a":""}`} onClick={()=>setPCat(ci)}>
        <MI name={c.icon} size={20} style={{color:"#006381"}}/>
        <div className="pbn">{c.cat}</div><div className="pbt">{cd}/{c.items.length} 項目</div>
        <div className="pds">{c.items.slice(0,6).map((_,j)=><span key={j} className={`pd${chk[`${ci}-${j}`]?" dn":""}`}/>)}</div>
      </div>})}</div>
      <h3 style={{fontSize:14,fontWeight:700,marginBottom:8,display:"flex",alignItems:"center",gap:5}}><MI name={PACKING[pCat].icon} size={16} style={{color:"#006381"}}/>{PACKING[pCat].cat}</h3>
      {PACKING[pCat].items.map((it,ii)=>{const k=`${pCat}-${ii}`,d=!!chk[k];return<div className="pi" key={ii} onClick={()=>tog(k)}>
        <div className={`pcb${d?" dn":""}`}>{d&&<MI name="check" size={14}/>}</div><span className={`pit${d?" dn":""}`}>{it}</span>
      </div>})}
    </div>}

    {tab==="emergency"&&<div className="ct">
      <div className="ec"><div className="ect"><MI name="emergency" fill size={18}/>緊急連絡先</div>
        {EMERGENCY.filter(e=>e.critical).map((e,i)=><div className="ecd" key={i}><span className="el"><MI name={e.icon} size={16}/>{e.label}</span><a className="en" href={`tel:${e.number}`} style={{color:"#b41340",fontSize:20}}>{e.number}</a></div>)}
      </div>
      <div className="es">医療相談</div>{EMERGENCY.filter(e=>e.medical).map((e,i)=><div className="ecd" key={i}><span className="el"><MI name={e.icon} size={16}/>{e.label}</span><a className="en" href={`tel:${e.number}`}>{e.number}</a></div>)}
      <div className="es">ロードサービス</div>{EMERGENCY.filter(e=>e.road).map((e,i)=><div className="ecd" key={i}><span className="el"><MI name={e.icon} size={16}/>{e.label}</span><a className="en" href={`tel:${e.number}`}>{e.number}</a></div>)}
      <div className="es">宿泊施設</div>{EMERGENCY.filter(e=>!e.critical&&!e.medical&&!e.road).map((e,i)=><div className="ecd" key={i}><span className="el"><MI name={e.icon} size={16}/>{e.label}</span><a className="en" href={`tel:${e.number}`}>{e.number}</a></div>)}
      <div className="es">フェリー予約番号</div>
      <div className="ecd"><span className="el"><MI name="directions_boat" size={16}/>高松→土庄 4/25</span><span className="en" style={{fontSize:12}}>0304250903</span></div>
      <div className="ecd"><span className="el"><MI name="directions_boat" size={16}/>土庄→高松 4/27</span><span className="en" style={{fontSize:12}}>0404270802</span></div>
      <div className="fr">⚠️ 車検証はフェリー乗船時に必須です<br/>🚗 GLC300（なにわ る・416）</div>
    </div>}

    <div className={`fab-overlay${fabOpen?" open":""}`} onClick={()=>setFabOpen(false)}/>
    <div className={`fab-menu${fabOpen?" open":""}`}>
      <button className="fab-action" onClick={()=>{setFabOpen(false);setTab("packing");}}><MI name="luggage" size={18}/>持ち物チェック</button>
      <button className="fab-action" onClick={()=>{setFabOpen(false);setTab("emergency");}}><MI name="emergency" size={18}/>緊急連絡先</button>
      <button className="fab-action" onClick={()=>{setFabOpen(false);setCover(true);}}><MI name="auto_stories" size={18}/>表紙に戻る</button>
    </div>
    <button className={`fab${fabOpen?" open":""}`} onClick={()=>setFabOpen(f=>!f)}><MI name="add" size={26}/></button>

    <div className="bn2">{TABS.map(t=><button key={t.id} className={`ni${tab===t.id?" a":""}`} onClick={()=>{setTab(t.id);setFabOpen(false);}}><MI name={t.icon} fill={tab===t.id} size={20}/><span>{t.label}</span></button>)}</div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
