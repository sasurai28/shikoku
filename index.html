  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(t);},[]);
  useEffect(()=>{try{const s=localStorage.getItem(STORAGE_KEY);if(s)setChk(JSON.parse(s));}catch{}},[]);
  useEffect(()=>{try{localStorage.setItem(STORAGE_KEY,JSON.stringify(chk));}catch{}},[chk]);
  useEffect(()=>{try{const s=localStorage.getItem(MEMO_KEY);if(s)setMemos(JSON.parse(s));}catch{}},[]);
  useEffect(()=>{try{localStorage.setItem(MEMO_KEY,JSON.stringify(memos));}catch{}},[memos]);
  useEffect(()=>{try{const s=localStorage.getItem(PACKING_CUSTOM_KEY);if(s)setPackCustom(JSON.parse(s));}catch{}},[]);
  useEffect(()=>{try{localStorage.setItem(PACKING_CUSTOM_KEY,JSON.stringify(packCustom));}catch{}},[packCustom]);
  useEffect(()=>{try{const s=localStorage.getItem(PHOTO_KEY);if(s)setCustomPhotos(JSON.parse(s));}catch{}},[]);
  useEffect(()=>{try{localStorage.setItem(PHOTO_KEY,JSON.stringify(customPhotos));}catch{}},[customPhotos]);
  useEffect(()=>{if(chatEndRef.current)chatEndRef.current.scrollIntoView({behavior:"smooth"});},[memos]);

  const handlePhotoUpload=(key,e)=>{
    const file=e.target.files?.[0];
    if(!file)return;
    if(file.size>5*1024*1024){alert("5MB以下の写真を選んでください");return;}
    const reader=new FileReader();
    reader.onload=(ev)=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement("canvas");
        const MAX=800;
        let w=img.width,h=img.height;
        if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
        canvas.width=w;canvas.height=h;
        canvas.getContext("2d").drawImage(img,0,0,w,h);
        const dataUrl=canvas.toDataURL("image/jpeg",0.8);
        setCustomPhotos(p=>({...p,[key]:dataUrl}));
        setPhotoModal(null);
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  const getPhoto=(key,original)=>customPhotos[key]||original;

  const tog=k=>setChk(p=>({...p,[k]:!p[k]}));
  const PACKING=DEFAULT_PACKING.map((c,ci)=>({...c,items:[...c.items,...(packCustom[ci]||[])]}));
  const total=PACKING.reduce((s,c)=>s+c.items.length,0);
  const done=Object.values(chk).filter(Boolean).length;
  const trip=new Date("2026-04-23T00:00:00+09:00");
  const tripEnd=new Date("2026-05-07T23:59:59+09:00");
  const diff=Math.max(0,trip-now);
  const isTraveling=now>=trip&&now<=tripEnd;
  const tripDay=isTraveling?Math.floor((now-trip)/864e5)+1:0;
  const dL=Math.floor(diff/864e5),hL=Math.floor((diff%864e5)/36e5),mL=Math.floor((diff%36e5)/6e4),sL=Math.floor((diff%6e4)/1e3);
  const day=DAYS[sel];

  const iconType=ev=>{
    if(ev.warn)return"bg-err";
    if(["hotel","spa","villa"].includes(ev.icon))return"bg-ter";
    if(["restaurant","dining","ramen_dining","local_pizza","set_meal","coffee"].includes(ev.icon))return"bg-sec";
    return"bg-pri";
  };

  const sendMemo=()=>{const t=memoText.trim();if(!t)return;setMemos(p=>[...p,{sender:memoSender,text:t,time:new Date().toISOString()}]);setMemoText("");};
  const addCustomItem=(ci)=>{const t=newItemText.trim();if(!t)return;setPackCustom(p=>({...p,[ci]:[...(p[ci]||[]),t]}));setNewItemText("");};
  const deleteItem=(catIdx,itemIdx)=>{
    const cat=PACKING[catIdx];const defaultLen=DEFAULT_PACKING[catIdx].items.length;
    if(confirm(`「${cat.items[itemIdx]}」を削除しますか？`)){
      if(itemIdx<defaultLen){setPackCustom(p=>({...p,[`del_${catIdx}`]:[...(p[`del_${catIdx}`]||[]),itemIdx]}));}
      else{const ci=itemIdx-defaultLen;setPackCustom(p=>{const items=[...(p[catIdx]||[])];items.splice(ci,1);return{...p,[catIdx]:items};});}
      setChk(p=>{const n={...p};delete n[`${catIdx}-${itemIdx}`];return n;});
    }
  };
  const getFilteredItems=(ci)=>{const del=packCustom[`del_${ci}`]||[];return PACKING[ci].items.map((item,idx)=>({item,idx})).filter(x=>!del.includes(x.idx));};
  const handleEventTap=(ev,e)=>{if(e.target.closest('.ml-btn'))return;if(ev.url)window.open(ev.url,'_blank','noopener,noreferrer');};

  // ===== COVER =====
  if(cover)return(<div className="max-w-[480px] mx-auto min-h-dvh bg-sf-low washi grain flex flex-col items-center justify-center text-center px-6 py-10 relative overflow-hidden">

        <div className="space-y-2.5">
          <div className="flex items-start gap-3"><div className="w-8 h-8 rounded-lg bg-pri/10 flex items-center justify-center flex-shrink-0"><MI name="location_on" size={16} style={{color:"#00668b"}}/></div><div><p className="text-[10px] font-bold text-on-sf-v uppercase tracking-wider">住所</p><p className="text-xs font-medium">{mealDetail.addr}</p></div></div>
          <div className="flex items-start gap-3"><div className="w-8 h-8 rounded-lg bg-pri/10 flex items-center justify-center flex-shrink-0"><MI name="call" size={16} style={{color:"#00668b"}}/></div><div><p className="text-[10px] font-bold text-on-sf-v uppercase tracking-wider">電話</p>{mealDetail.tel!=="—"?<a href={`tel:${mealDetail.tel}`} className="text-xs font-bold text-pri">{mealDetail.tel}</a>:<p className="text-xs text-on-sf-v">—</p>}</div></div>
          <div className="flex items-start gap-3"><div className="w-8 h-8 rounded-lg bg-sec/10 flex items-center justify-center flex-shrink-0"><MI name="schedule" size={16} style={{color:"#4a6800"}}/></div><div><p className="text-[10px] font-bold text-on-sf-v uppercase tracking-wider">営業時間</p><p className="text-xs font-medium">{mealDetail.hours}</p></div></div>
          <div className="flex items-start gap-3"><div className="w-8 h-8 rounded-lg bg-ter/10 flex items-center justify-center flex-shrink-0"><MI name="payments" size={16} style={{color:"#b62524"}}/></div><div><p className="text-[10px] font-bold text-on-sf-v uppercase tracking-wider">予算</p><p className="text-xs font-bold">{mealDetail.budget}</p></div></div>
        </div>
        <div className="flex gap-2 mt-5">
          <a href={mealDetail.maps} target="_blank" rel="noopener noreferrer" className="flex-1 flex items-center justify-center gap-1.5 py-3 bg-pri text-on-pri rounded-xl font-bold text-xs kinetic"><MI name="map" size={16}/>地図を開く</a>
          {mealDetail.url&&<a href={mealDetail.url} target="_blank" rel="noopener noreferrer" className="flex-1 flex items-center justify-center gap-1.5 py-3 bg-sf-low text-on-sf rounded-xl font-bold text-xs kinetic"><MI name="open_in_new" size={16}/>公式サイト</a>}
        </div>
        <button className="w-full mt-3 py-2.5 text-on-sf-v text-xs font-medium" onClick={()=>setMealDetail(null)}>閉じる</button>
      </div>
    </div>}

    {/* Photo Upload Modal */}
    {photoModal&&<div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/40 backdrop-blur-sm" onClick={()=>setPhotoModal(null)}>
      <div className="bg-white rounded-2xl p-6 mx-4 max-w-xs w-full shadow-2xl animate-scale-in" onClick={e=>e.stopPropagation()}>
        <h3 className="font-h font-bold text-lg mb-1">写真を<span className="serif-i text-pri">変更</span></h3>
        <p className="text-xs text-on-sf-v mb-4">旅行中に撮った写真で差し替えできます</p>
        <label className="flex items-center justify-center gap-2 w-full py-3 bg-pri text-on-pri rounded-xl font-bold text-sm kinetic cursor-pointer">
          <MI name="photo_camera" size={18}/>写真を選択
          <input type="file" accept="image/*" className="hidden" onChange={(e)=>handlePhotoUpload(photoModal,e)}/>
        </label>
        {customPhotos[photoModal]&&<button className="w-full mt-2 py-2.5 bg-err/10 text-err rounded-xl font-bold text-xs kinetic" onClick={()=>{setCustomPhotos(p=>{const n={...p};delete n[photoModal];return n;});setPhotoModal(null);}}>元の写真に戻す</button>}
        <button className="w-full mt-2 py-2 text-on-sf-v text-xs font-medium" onClick={()=>setPhotoModal(null)}>キャンセル</button>
      </div>
    </div>}

    {/* FAB - hidden on memo tab */}
    {tab!=="memo"&&<><div className={`fixed inset-0 bg-on-sf/10 z-[43] glass transition-opacity ${fabOpen?"opacity-100":"opacity-0 pointer-events-none"}`} onClick={()=>setFabOpen(false)}/>
    <div className={`fixed bottom-[132px] right-[max(calc((100%-480px)/2+8px),8px)] z-[44] flex flex-col gap-2 items-end transition-all ${fabOpen?"opacity-100 translate-y-0":"opacity-0 translate-y-3 pointer-events-none"}`} style={{paddingBottom:"env(safe-area-inset-bottom,20px)"}}>
      <button className="flex items-center gap-2 bg-white rounded-xl px-4 py-2.5 shadow-lg font-b text-xs font-bold kinetic" onClick={()=>{setFabOpen(false);setTab("packing");}}><MI name="luggage" size={16} style={{color:"#00668b"}}/>持ち物チェック</button>
      <button className="flex items-center gap-2 bg-white rounded-xl px-4 py-2.5 shadow-lg font-b text-xs font-bold kinetic" onClick={()=>{setFabOpen(false);setTab("emergency");}}><MI name="emergency" size={16} style={{color:"#b62524"}}/>緊急連絡先</button>
      <button className="flex items-center gap-2 bg-white rounded-xl px-4 py-2.5 shadow-lg font-b text-xs font-bold kinetic" onClick={()=>{setFabOpen(false);setCover(true);}}><MI name="auto_stories" size={16} style={{color:"#00668b"}}/>表紙に戻る</button>
    </div>
    <button className={`fixed bottom-[calc(70px+env(safe-area-inset-bottom,20px))] right-[max(calc((100%-480px)/2+16px),16px)] z-[45] w-14 h-14 rounded-full bg-ter text-white shadow-2xl flex items-center justify-center kinetic transition-transform ${fabOpen?"rotate-45 bg-on-sf":""}`} onClick={()=>setFabOpen(f=>!f)}><MI name="add" size={26}/></button></>}

    {/* Bottom Nav */}
    <nav className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] z-50 flex justify-around items-center px-3 py-1.5 glass bg-sf/80 rounded-t-2xl border-t border-ol-v/8 shadow-[0_-4px_20px_rgba(55,50,34,0.04)] safe-b">
      {TABS.map(t=><button key={t.id} className={`flex flex-col items-center gap-0.5 px-3 py-1.5 rounded-full transition-all kinetic ${tab===t.id?"bg-pri text-on-pri shadow-md scale-105":"text-on-sf-v opacity-50 hover:opacity-80"}`} onClick={()=>{setTab(t.id);setFabOpen(false);}}>
        <MI name={t.icon} fill={tab===t.id} size={20}/>
        <span className="text-[9px] font-bold font-b">{t.label}</span>
      </button>)}
    </nav>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').then(r=>{
      console.log('SW registered:',r.scope);
    }).catch(e=>console.log('SW registration failed:',e));
  });
}
</script>
</body>
</html>
